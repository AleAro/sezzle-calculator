services:
  backend:
    build: ./backend
    environment:
      PORT: "8080"
      CORS_ALLOWED_ORIGIN: "http://localhost:${APP_PORT:-3000}"
    ports:
      - "${API_PORT:-8080}:8080"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${APP_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped
